services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nyo-dashboard-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_ENGINE: mysql
      DB_HOST: db
      DB_PORT: 3306
      MEDIA_ROOT: /app/media
      STATIC_ROOT: /app/staticfiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health/', timeout=5)"
      interval: 20s
      timeout: 5s
      retries: 12
      start_period: 180s
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

  db:
    image: mysql:8.4
    container_name: nyo-dashboard-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nyo_dashboard}
      MYSQL_USER: ${DB_USER:-nyo_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nyo_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    volumes:
      - mysql_data:/var/lib/mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: nyo-dashboard-nginx
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt_certs:/etc/letsencrypt
      - static_data:/var/www/static:ro
      - ./docker/nginx/entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
    entrypoint: ["/bin/sh", "/docker-entrypoint-custom.sh"]

  certbot:
    image: certbot/certbot:latest
    container_name: nyo-dashboard-certbot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - nginx
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt_certs:/etc/letsencrypt
      - ./docker/certbot/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  ollama:
    image: ollama/ollama:latest
    container_name: nyo-dashboard-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-32}
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    container_name: nyo-dashboard-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Ollama to become ready..."
        until ollama list >/dev/null 2>&1; do
          sleep 3
        done
        echo "Pulling model $$OLLAMA_MODEL..."
        ollama pull "$$OLLAMA_MODEL"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  mysql_data:
  media_data:
  static_data:
  certbot_www:
  letsencrypt_certs:
  ollama_data:
