{% extends "base.html" %}

{% block title %}Upload QR | NYO{% endblock %}
{% block page_heading %}Upload QR Code{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="card p-6 sm:p-8">
    <form method="post" enctype="multipart/form-data" class="grid gap-4 sm:grid-cols-2">
      {% csrf_token %}
      {% for field in form %}
      <div class="{% if field.name == 'image' %}sm:col-span-2{% endif %}">
        <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1">{{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}</label>
        {{ field }}
        {% if field.errors %}<p class="text-xs text-red-600 mt-1">{{ field.errors|join:", " }}</p>{% endif %}
      </div>
      {% endfor %}
      <div class="sm:col-span-2 flex flex-col sm:flex-row gap-3 pt-2">
        <a href="{% url 'payments:qrcode_list' %}" class="btn btn-secondary flex-1 justify-center">Cancel</a>
        <button type="submit" class="btn btn-primary flex-1 justify-center"><i class="fa-solid fa-upload"></i>Save QR</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
