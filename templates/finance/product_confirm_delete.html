{% extends "base.html" %}

{% block title %}Delete Product | NYO{% endblock %}
{% block page_heading %}Delete Product{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
  <section class="card p-6 border-red-200 dark:border-red-500/30">
    <p class="text-xs uppercase tracking-wider text-red-600 font-semibold mb-1">Inventory</p>
    <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Remove {{ object.name }}?</h2>
    <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">This permanently deletes the product and removes it from the catalog.</p>
    <form method="post" class="mt-5 flex flex-col sm:flex-row gap-3">
      {% csrf_token %}
      <a href="{% url 'finance:product_list' %}" class="btn btn-secondary flex-1 justify-center">Cancel</a>
      <button type="submit" class="btn btn-danger flex-1 justify-center"><i class="fa-solid fa-trash"></i>Delete</button>
    </form>
  </section>
</div>
{% endblock %}
