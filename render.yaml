databases:
  - name: nyo-dashboard-db
    databaseName: nyo_dashboard
    user: nyo_dashboard
    plan: free

services:
  - type: web
    name: nyo-admin-dashboard
    runtime: python
    plan: starter
    region: singapore
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate
    startCommand: python -m gunicorn nyo_dashboard.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health/
    disk:
      name: app-media
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: nyo-dashboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: MEDIA_ROOT
        value: /var/data/media
