databases:
  - name: nyo-dashboard-db
    databaseName: nyo_dashboard
    user: nyo_dashboard
    plan: free

services:
  - type: web
    name: nyo-admin-dashboard
    runtime: python
    plan: free
    region: singapore
    buildCommand: bash build.sh
    startCommand: python -m gunicorn nyo_dashboard.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: DATABASE_URL
        fromDatabase:
          name: nyo-dashboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
